<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1344" viewBox="0 0 1200 1680">
  <rect width="1200" height="1680" fill="#f4f8fc"/>
  <rect x="64" y="54" width="1072" height="1572" rx="28" fill="#ffffff" stroke="#d6e3f0" stroke-width="4"/>
  <rect x="64" y="54" width="1072" height="120" rx="28" fill="#0d6efd"/>
  <text x="120" y="130" font-size="44" font-family="Microsoft YaHei, Arial" fill="#ffffff">Operation Manual</text>
  <text x="120" y="235" font-size="28" font-family="Microsoft YaHei, Arial" fill="#2b3e55">Page 2 / User Management</text>

  <rect x="120" y="300" width="960" height="360" rx="18" fill="#ffffff" stroke="#d7e6f5" stroke-width="3"/>
  <text x="160" y="370" font-size="30" font-family="Microsoft YaHei, Arial" fill="#1e4f8a">1. Add User</text>
  <rect x="160" y="418" width="780" height="72" rx="12" fill="#f6f9fd" stroke="#d7e6f5" stroke-width="2"/>
  <rect x="960" y="418" width="80" height="72" rx="12" fill="#3b82f6"/>
  <text x="994" y="463" font-size="20" font-family="Microsoft YaHei, Arial" fill="#ffffff" text-anchor="middle">Add</text>
  <text x="160" y="552" font-size="24" font-family="Microsoft YaHei, Arial" fill="#4a5d75">Administrators can create users by entering name, password and role.</text>

  <rect x="120" y="710" width="960" height="360" rx="18" fill="#eef5ff" stroke="#bfd6f5" stroke-width="3"/>
  <text x="160" y="780" font-size="30" font-family="Microsoft YaHei, Arial" fill="#1e4f8a">2. Edit User</text>
  <rect x="160" y="832" width="880" height="170" rx="16" fill="#ffffff" stroke="#cfe0f4" stroke-width="2"/>
  <line x1="460" y1="832" x2="460" y2="1002" stroke="#d7e6f5" stroke-width="2"/>
  <line x1="760" y1="832" x2="760" y2="1002" stroke="#d7e6f5" stroke-width="2"/>
  <text x="220" y="894" font-size="24" font-family="Microsoft YaHei, Arial" fill="#394b62">Username</text>
  <text x="555" y="894" font-size="24" font-family="Microsoft YaHei, Arial" fill="#394b62">Password</text>
  <text x="885" y="894" font-size="24" font-family="Microsoft YaHei, Arial" fill="#394b62">Role</text>
  <text x="160" y="1040" font-size="24" font-family="Microsoft YaHei, Arial" fill="#4a5d75">Click a user row to enter edit mode. Click the same row again to exit without saving.</text>

  <rect x="120" y="1110" width="960" height="360" rx="18" fill="#ffffff" stroke="#d7e6f5" stroke-width="3"/>
  <text x="160" y="1180" font-size="30" font-family="Microsoft YaHei, Arial" fill="#1e4f8a">3. Permission Rules</text>
  <circle cx="182" cy="1250" r="8" fill="#3b82f6"/>
  <text x="210" y="1260" font-size="24" font-family="Microsoft YaHei, Arial" fill="#4a5d75">Role value 1 = Administrator</text>
  <circle cx="182" cy="1315" r="8" fill="#3b82f6"/>
  <text x="210" y="1325" font-size="24" font-family="Microsoft YaHei, Arial" fill="#4a5d75">Role value 0 = Operator</text>
  <circle cx="182" cy="1380" r="8" fill="#3b82f6"/>
  <text x="210" y="1390" font-size="24" font-family="Microsoft YaHei, Arial" fill="#4a5d75">Operators can browse and highlight rows, but cannot edit users.</text>
  <circle cx="182" cy="1445" r="8" fill="#3b82f6"/>
  <text x="210" y="1455" font-size="24" font-family="Microsoft YaHei, Arial" fill="#4a5d75">Administrators can edit operators and themselves, but not other administrators.</text>
</svg>
